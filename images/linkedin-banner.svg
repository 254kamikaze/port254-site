<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2332" stroke-width="0.5"/>
    </pattern>

    <!-- Circuit pattern -->
    <pattern id="circuit" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#60a5fa" opacity="0.15"/>
      <circle cx="90" cy="50" r="2" fill="#60a5fa" opacity="0.15"/>
      <circle cx="50" cy="90" r="2" fill="#60a5fa" opacity="0.15"/>
      <path d="M10 10 L10 50 L50 50" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.1"/>
      <path d="M90 50 L90 90 L50 90" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>
  <rect width="1584" height="396" fill="url(#grid)" opacity="0.5"/>
  <rect width="1584" height="396" fill="url(#circuit)"/>

  <!-- Decorative elements - left side network nodes -->
  <g opacity="0.4">
    <circle cx="80" cy="100" r="4" fill="#60a5fa"/>
    <circle cx="150" cy="150" r="3" fill="#60a5fa"/>
    <circle cx="100" cy="220" r="5" fill="#60a5fa"/>
    <circle cx="200" cy="280" r="3" fill="#60a5fa"/>
    <circle cx="50" cy="300" r="4" fill="#60a5fa"/>
    <line x1="80" y1="100" x2="150" y2="150" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="150" x2="100" y2="220" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="220" x2="200" y2="280" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="220" x2="50" y2="300" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Right side network nodes -->
  <g opacity="0.4">
    <circle cx="1500" cy="80" r="4" fill="#60a5fa"/>
    <circle cx="1450" cy="160" r="3" fill="#60a5fa"/>
    <circle cx="1520" cy="250" r="5" fill="#60a5fa"/>
    <circle cx="1400" cy="300" r="3" fill="#60a5fa"/>
    <circle cx="1480" cy="350" r="4" fill="#60a5fa"/>
    <line x1="1500" y1="80" x2="1450" y2="160" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="1450" y1="160" x2="1520" y2="250" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="1520" y1="250" x2="1400" y2="300" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
    <line x1="1520" y1="250" x2="1480" y2="350" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Hexagon decorations -->
  <g transform="translate(250, 80)" opacity="0.2">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  </g>
  <g transform="translate(1280, 260)" opacity="0.2">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(350, 140)" opacity="0.15">
    <path d="M40 0 L80 20 L80 50 C80 80 40 100 40 100 C40 100 0 80 0 50 L0 20 Z"
          fill="none" stroke="#60a5fa" stroke-width="2"/>
    <path d="M40 25 L40 70 M25 45 L55 45" stroke="#60a5fa" stroke-width="2"/>
  </g>

  <!-- Terminal/code block decoration -->
  <g transform="translate(1150, 60)" opacity="0.15">
    <rect x="0" y="0" width="120" height="80" rx="5" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="15" cy="12" r="4" fill="#ef4444"/>
    <circle cx="30" cy="12" r="4" fill="#eab308"/>
    <circle cx="45" cy="12" r="4" fill="#22c55e"/>
    <text x="10" y="40" font-family="monospace" font-size="10" fill="#60a5fa">$ whoami</text>
    <text x="10" y="55" font-family="monospace" font-size="10" fill="#9ca3af">port254</text>
    <text x="10" y="70" font-family="monospace" font-size="10" fill="#60a5fa">$_</text>
  </g>

  <!-- Main content area -->
  <g transform="translate(792, 198)">
    <!-- Logo/Brand -->
    <text x="0" y="-50"
          font-family="Arial, sans-serif"
          font-size="72"
          font-weight="700"
          fill="#60a5fa"
          text-anchor="middle"
          filter="url(#glow)">port254</text>

    <!-- Tagline -->
    <text x="0" y="10"
          font-family="Arial, sans-serif"
          font-size="24"
          fill="#d1d5db"
          text-anchor="middle">Cybersecurity Research</text>

    <!-- Specializations -->
    <text x="0" y="55"
          font-family="Arial, sans-serif"
          font-size="16"
          fill="#9ca3af"
          text-anchor="middle">Threat Intelligence  |  Active Directory  |  OT/ICS Security  |  IEC 62443</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="542" y="320" width="500" height="2" fill="#60a5fa" opacity="0.6" rx="1"/>

  <!-- Corner accents -->
  <path d="M0 0 L60 0 L60 5 L5 5 L5 60 L0 60 Z" fill="#60a5fa" opacity="0.3"/>
  <path d="M1584 0 L1524 0 L1524 5 L1579 5 L1579 60 L1584 60 Z" fill="#60a5fa" opacity="0.3"/>
  <path d="M0 396 L60 396 L60 391 L5 391 L5 336 L0 336 Z" fill="#60a5fa" opacity="0.3"/>
  <path d="M1584 396 L1524 396 L1524 391 L1579 391 L1579 336 L1584 336 Z" fill="#60a5fa" opacity="0.3"/>
</svg>